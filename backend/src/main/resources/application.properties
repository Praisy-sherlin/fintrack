# ── Server ──────────────────────────────────────────────────────────
server.port=8080
server.error.include-message=always

# ── Database ─────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fintrack}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Redis ────────────────────────────────────────────────────────────
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_REDIS_PASSWORD:}

# ── JWT ──────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:fintrack-super-secret-jwt-key-must-be-256-bits-minimum-length}
jwt.expiration=${JWT_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ── Mail ─────────────────────────────────────────────────────────────
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${SPRING_MAIL_USERNAME:noreply@fintrack.com}

# ── File Upload ───────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:./uploads}

# ── App ───────────────────────────────────────────────────────────────
app.name=FinTrack
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.max-login-attempts=5
app.lockout-duration-minutes=30

# ── Actuator ──────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
